url: https://hypnor.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # ── Colours (hex sticker palette) ────────────────────────────────────────
    # cream #FFF7C5 | amber #F4AE52 | maroon #4F252E
    # teal  #C1EBE9 | navy  #1B3A5C
    bg:              "#FFF7C5"          # cream
    fg:              "#4F252E"          # maroon
    primary:         "#F4AE52"          # amber
    secondary:       "#1B3A5C"          # navy
    success:         "#C1EBE9"          # teal
    info:            "#C1EBE9"          # teal
    warning:         "#F4AE52"          # amber
    danger:          "#4F252E"          # maroon

    # ── Fonts ─────────────────────────────────────────────────────────────────
    base_font:       {google: "DM Sans"}
    heading_font:    {google: "DM Sans"}
    code_font:       {google: "JetBrains Mono"}

    # ── Typography ────────────────────────────────────────────────────────────
    font-size-base:  "1rem"
    headings-font-weight: 700

    # ── Cards / surfaces ──────────────────────────────────────────────────────
    card-bg:         "#FFFEF0"          # warm white
    card-border-color: "#F4AE52"        # amber
    card-border-radius: "0.75rem"

    # ── Code blocks ───────────────────────────────────────────────────────────
    pre-bg:          "#4F252E"          # maroon
    pre-color:       "#FFF7C5"          # cream

  includes:
    in_header: |
      <meta property="og:image" content="https://hypnor.circadia-lab.uk/logo.png">
      <meta property="og:image:width" content="1080">
      <meta property="og:image:height" content="1080">
      <meta property="og:image:type" content="image/png">
      <meta name="twitter:card" content="summary">
      <meta name="twitter:image" content="https://hypnor.circadia-lab.uk/logo.png">
      <script src="https://cdn.usefathom.com/script.js" data-site="NKUSHGRU" defer></script>
      <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#F4AE52">
      <meta name="msapplication-TileColor" content="#4F252E">
      <meta name="theme-color" content="#4F252E">
      <style>
        /* ── Navbar ── */
        .navbar {
          background-color: #4F252E !important;
          border-bottom: 2px solid #F4AE52;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar .navbar-toggler-icon,
        .navbar form .btn {
          color: #FFF7C5 !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.8; }
        .navbar-nav .nav-link.active {
          color: #FFF7C5 !important;
          border-bottom: 2px solid #F4AE52;
        }
        .navbar small.nav-text { color: #F4AE52 !important; }

        /* ── Navbar logo size ── */
        .navbar-brand img { height: 40px; width: auto; }

        /* ── Remove border under page title ── */
        .page-header { border-bottom: none !important; }

        /* ── Sidebar TOC links ── */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #4F252E !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #1B3A5C !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #1B3A5C !important;
          border-left: 2px solid #F4AE52;
          font-weight: 600;
        }

        /* ── text-muted ── */
        .text-muted { color: #1B3A5C !important; }

        /* ── Sidebar border ── */
        .sidebar { border-left: 3px solid #F4AE52; padding-left: 1rem; }

        /* ── Reference index section headers ── */
        .reference-index h2 {
          color: #1B3A5C;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* ── Inline code ── */
        code { color: #4F252E; background: #C1EBE9;
          border-radius: 4px; padding: 0.1em 0.35em; }

        /* ── Links ── */
        a { color: #4F252E; }
        a:hover { color: #F4AE52; }

        /* ── Footer ── */
        .footer { background: #4F252E; color: #FFF7C5; padding: 1.5rem 0; }
        .footer a { color: #F4AE52; }

        /* ── Search ── */
        #search-input { border-color: #F4AE52; }

        /* ── Buttons ── */
        .btn-primary {
          background-color: #F4AE52 !important;
          border-color: #F4AE52 !important;
          color: #4F252E !important;
        }
        .btn-primary:hover {
          background-color: #4F252E !important;
          border-color: #4F252E !important;
          color: #FFF7C5 !important;
        }
      </style>

logo: man/figures/logo.svg
favicon: man/figures/favicon.svg

opengraph:
  image:
    src: https://hypnor.circadia-lab.uk/logo.png
    alt: "hypnoR - Hypnogram handling and sleep architecture metrics for R"
  twitter:
    creator: "@circadia_lab"
    card: summary

home:
  title: "hypnoR — Hypnogram handling and sleep architecture metrics for R"
  description: >
    An R package for ingesting, analysing, and visualising sleep hypnograms.
    Staging-agnostic: accepts full AASM (mrpheus) and coarse actigraphy-derived
    (zeitR) hypnograms. Built by the Circadia Lab at Northumbria University.
  links:
  - text: Circadia Lab
    href: https://circadia-lab.uk
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/hypnoR
      aria-label: GitHub

reference:
- title: "Constructors"
  desc: "Build the hypnor_hypnogram object used by every other function."
  contents:
  - new_hypnogram

- title: "Preprocessing"
  desc: "Clean up and window a hypnogram before computing metrics."
  contents:
  - smooth_hypnogram
  - window_hypnogram

- title: "Ingestion"
  desc: "Read hypnograms from common file formats."
  contents:
  - starts_with("read_")

- title: "Architecture metrics"
  desc: "Compute summary sleep architecture statistics."
  contents:
  - compute_sleep_architecture

- title: "Cycle segmentation"
  desc: "Detect NREM/REM sleep cycles."
  contents:
  - compute_cycles

- title: "Transition analysis"
  desc: "Stage-to-stage transitions and fragmentation indices."
  contents:
  - compute_transitions

- title: "Plotting"
  desc: "Publication-ready hypnogram and architecture visualisations."
  contents:
  - plot_hypnogram
  - plot_architecture
  - plot_transition_matrix

- title: "Package"
  desc: "Package-level documentation."
  contents:
  - hypnoR-package

articles:
- title: "Getting started"
  navbar: ~
  contents:
  - getting-started

- title: "Worked examples"
  navbar: ~
  contents:
  - "`articles/mrpheus-integration`"
  - "`articles/zeitR-integration`"

news:
  releases:
  - text: "Changelog"
    href: news/index.html

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319
  Mario Leocadio-Miguel:
    href: https://orcid.org/0000-0002-7248-3529

footer:
  structure:
    left: [package, developed_by]
    right: [built_with]
  components:
    package: >
      **hypnoR** — Circadia Lab, Northumbria University.
    developed_by: >
      Lucas França & Mario Leocadio-Miguel.
