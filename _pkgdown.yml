url: https://hypnor.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # ── Colours ───────────────────────────────────────────────────────────────
    # midnight navy #0D1B2A | sky blue #4A9BBF | teal ice #9BDFE2
    # coral wake  #FC544A   | deep ocean #014370 | off-white #F0F6FB
    bg:              "#F0F6FB"          # cool off-white
    fg:              "#0D1B2A"          # midnight navy
    primary:         "#4A9BBF"          # sky blue
    secondary:       "#014370"          # deep ocean
    success:         "#9BDFE2"          # teal ice
    info:            "#D6EEF5"          # pale sky
    warning:         "#FFA75D"          # amber
    danger:          "#FC544A"          # coral wake

    # ── Fonts ─────────────────────────────────────────────────────────────────
    base_font:       {google: "DM Sans"}
    heading_font:    {google: "DM Sans"}
    code_font:       {google: "JetBrains Mono"}

    # ── Typography ────────────────────────────────────────────────────────────
    font-size-base:  "1rem"
    headings-font-weight: 700

    # ── Cards / surfaces ──────────────────────────────────────────────────────
    card-bg:         "#FFFFFF"
    card-border-color: "#D6EEF5"
    card-border-radius: "0.75rem"

    # ── Code blocks ───────────────────────────────────────────────────────────
    pre-bg:          "#0D1B2A"          # midnight navy
    pre-color:       "#9BDFE2"          # teal ice

  includes:
    in_header: |
      <meta property="og:image" content="https://hypnor.circadia-lab.uk/logo.png">
      <meta property="og:image:width" content="1080">
      <meta property="og:image:height" content="1080">
      <meta property="og:image:type" content="image/png">
      <meta name="twitter:card" content="summary">
      <meta name="twitter:image" content="https://hypnor.circadia-lab.uk/logo.png">
      <script src="https://cdn.usefathom.com/script.js" data-site="CKGXUGRT" defer></script>
      <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#4A9BBF">
      <meta name="msapplication-TileColor" content="#0D1B2A">
      <meta name="theme-color" content="#0D1B2A">
      <style>
        /* ── Navbar ── */
        .navbar {
          background-color: #0D1B2A !important;
          border-bottom: 2px solid #4A9BBF;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar .navbar-toggler-icon,
        .navbar form .btn {
          color: #D6EEF5 !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.8; }
        .navbar-nav .nav-link.active {
          color: #D6EEF5 !important;
          border-bottom: 2px solid #9BDFE2;
        }
        .navbar small.nav-text { color: #9BDFE2 !important; }

        /* ── Navbar logo size ── */
        .navbar-brand img { height: 40px; width: auto; }

        /* ── Remove border under page title ── */
        .page-header { border-bottom: none !important; }

        /* ── Sidebar TOC links ── */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #0D1B2A !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #014370 !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #014370 !important;
          border-left: 2px solid #4A9BBF;
          font-weight: 600;
        }

        /* ── text-muted ── */
        .text-muted { color: #1B6799 !important; }

        /* ── Sidebar border ── */
        .sidebar { border-left: 3px solid #4A9BBF; padding-left: 1rem; }

        /* ── Reference index section headers ── */
        .reference-index h2 {
          color: #014370;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* ── Inline code ── */
        code { color: #014370; background: #D6EEF5;
          border-radius: 4px; padding: 0.1em 0.35em; }

        /* ── Links ── */
        a { color: #1B6799; }
        a:hover { color: #4A9BBF; }

        /* ── Footer ── */
        .footer { background: #0D1B2A; color: #D6EEF5; padding: 1.5rem 0; }
        .footer a { color: #9BDFE2; }

        /* ── Search ── */
        #search-input { border-color: #4A9BBF; }

        /* ── Buttons ── */
        .btn-primary {
          background-color: #4A9BBF !important;
          border-color: #4A9BBF !important;
          color: #0D1B2A !important;
        }
        .btn-primary:hover {
          background-color: #014370 !important;
          border-color: #014370 !important;
          color: #D6EEF5 !important;
        }
      </style>

logo: man/figures/logo.svg
favicon: man/figures/favicon.svg

opengraph:
  image:
    src: https://hypnor.circadia-lab.uk/logo.png
    alt: "hypnoR - Hypnogram handling and sleep architecture metrics for R"
  twitter:
    creator: "@circadia_lab"
    card: summary

home:
  title: "hypnoR — Hypnogram handling and sleep architecture metrics for R"
  description: >
    An R package for ingesting, analysing, and visualising sleep hypnograms.
    Staging-agnostic: accepts full AASM (mrpheus) and coarse actigraphy-derived
    (zeitR) hypnograms. Built by the Circadia Lab at Northumbria University.
  links:
  - text: Circadia Lab
    href: https://circadia-lab.uk
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/hypnoR
      aria-label: GitHub

reference:
- title: "Ingestion"
  desc: "Read hypnograms from common file formats."
  contents:
  - starts_with("read_")

- title: "Architecture metrics"
  desc: "Compute summary sleep architecture statistics."
  contents:
  - compute_sleep_architecture

- title: "Cycle segmentation"
  desc: "Detect NREM/REM sleep cycles."
  contents:
  - compute_cycles

- title: "Transition analysis"
  desc: "Stage-to-stage transitions and fragmentation indices."
  contents:
  - compute_transitions

- title: "Plotting"
  desc: "Publication-ready hypnogram and architecture visualisations."
  contents:
  - plot_hypnogram
  - plot_architecture
  - plot_transition_matrix

- title: "Package"
  desc: "Package-level documentation."
  contents:
  - hypnoR-package

articles:
- title: "Getting started"
  navbar: ~
  contents:
  - getting-started

news:
  releases:
  - text: "Changelog"
    href: news/index.html

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319
  Mario Leocadio-Miguel:
    href: https://orcid.org/0000-0002-7248-3529

footer:
  structure:
    left: [package, developed_by]
    right: [built_with]
  components:
    package: >
      **hypnoR** — Circadia Lab, Northumbria University.
    developed_by: >
      Lucas França & Mario Leocadio-Miguel.
